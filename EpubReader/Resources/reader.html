<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>EpubReader</title>
    <script src="jszip.min.js"></script>
    <script src="epub.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #FFFFF8;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        #viewer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div id="viewer"></div>
    <script>
        (function () {
            'use strict';

            window.bridge = {
                send: function (type, data) {
                    var payload = Object.assign({ type: type }, data || {});
                    window.webkit.messageHandlers.bridge.postMessage(payload);
                }
            };

            window.book = null;
            window.rendition = null;
            window.currentLoadToken = 0;

            function withTimeout(promise, timeoutMs, label) {
                return Promise.race([
                    promise,
                    new Promise(function (_, reject) {
                        setTimeout(function () {
                            reject(new Error(label + ' timed out after ' + timeoutMs + 'ms'));
                        }, timeoutMs);
                    })
                ]);
            }

            function teardownCurrentBook() {
                try {
                    if (window.rendition) {
                        window.rendition.destroy();
                    }
                } catch (_) {
                }

                try {
                    if (window.book && typeof window.book.destroy === 'function') {
                        window.book.destroy();
                    }
                } catch (_) {
                }

                window.rendition = null;
                window.book = null;

                var viewer = document.getElementById('viewer');
                if (viewer) {
                    viewer.innerHTML = '';
                }
            }

            var themeMap = {
                light:  { bg: '#FFFFF8', fg: '#1C1C1E' },
                dark:   { bg: '#1C1C1E', fg: '#E5E5EA' },
                sepia:  { bg: '#F4ECD8', fg: '#3B2F2F' },
                custom: { bg: '#FFFFF8', fg: '#1C1C1E' }
            };

            function canUseRendition(commandName) {
                if (!window.rendition) {
                    window.bridge.send('jsGuardBlocked', { command: commandName, reason: 'missingRendition' });
                    return false;
                }
                if (!window.rendition.manager) {
                    window.bridge.send('jsGuardBlocked', { command: commandName, reason: 'missingManager' });
                    return false;
                }
                return true;
            }

            function safeRun(commandName, fn) {
                if (!canUseRendition(commandName)) {
                    return;
                }
                try {
                    fn();
                } catch (error) {
                    var message = (error && error.message) ? error.message : String(error);
                    window.bridge.send('bookError', { message: commandName + ': ' + message });
                }
            }

            function applyContentTheme(name) {
                if (!window.rendition) { return; }

                var selectedTheme = normalizedThemeName(name);
                var t = themeMap[selectedTheme];

                window.rendition.getContents().forEach(function (content) {
                    try {
                        var doc = content && content.document;
                        if (!doc) { return; }

                        var styleId = 'apub-theme-override';
                        var style = doc.getElementById(styleId);
                        if (!style) {
                            style = doc.createElement('style');
                            style.id = styleId;
                            doc.head.appendChild(style);
                        }

                        style.textContent = [
                            'html, body {',
                            '  background: ' + t.bg + ' !important;',
                            '  color: ' + t.fg + ' !important;',
                            '  -webkit-text-fill-color: ' + t.fg + ' !important;',
                            '}',
                            'p, div, span, li, blockquote, dd, dt {',
                            '  color: ' + t.fg + ' !important;',
                            '  -webkit-text-fill-color: ' + t.fg + ' !important;',
                            '}'
                        ].join('\n');
                    } catch (_) {
                        // Ignore per-spine theming errors to avoid breaking pagination.
                    }
                });
            }

            function normalizedThemeName(name) {
                if (typeof name !== 'string' || !themeMap[name]) {
                    return 'light';
                }
                return name;
            }

            function installFootnoteInterceptors(contents) {
                try {
                    var doc = contents && contents.document;
                    if (!doc) { return; }
                    var links = doc.querySelectorAll('a[epub\\:type~="noteref"], a[role~="doc-noteref"]');
                    links.forEach(function (link) {
                        if (link.dataset && link.dataset.apubFootnoteBound === '1') {
                            return;
                        }

                        var handler = function (event) {
                            event.preventDefault();
                            event.stopPropagation();

                            var href = link.getAttribute('href') || '';
                            var text = '';

                            if (href.indexOf('#') >= 0) {
                                var fragment = href.split('#').pop();
                                if (fragment) {
                                    var decoded = decodeURIComponent(fragment);
                                    var byId = doc.getElementById(decoded);
                                    if (byId && byId.textContent) {
                                        text = byId.textContent.trim();
                                    }
                                }
                            }

                            if (!text && link.title) {
                                text = link.title.trim();
                            }
                            if (!text && link.textContent) {
                                text = link.textContent.trim();
                            }

                            window.bridge.send('footnoteRequest', { href: href, text: text });
                        };

                        link.addEventListener('click', handler, true);
                        if (link.dataset) {
                            link.dataset.apubFootnoteBound = '1';
                        }
                    });
                } catch (_) {
                    // Non-fatal: footnote interception should never break reading.
                }
            }

            window.setTheme = function (name) {
                if (!window.rendition) { return; }
                var selectedTheme = normalizedThemeName(name);
                var t = themeMap[selectedTheme];
                window.rendition.themes.select(selectedTheme);
                document.documentElement.style.background = t.bg;
                document.body.style.background = t.bg;
                applyContentTheme(selectedTheme);
            };

            window.setFontSize = function (px) {
                safeRun('setFontSize', function () {
                    window.rendition.themes.fontSize(px + 'px');
                    window.rendition.resize(window.innerWidth, window.innerHeight);
                });
            };

            window.setFontFamily = function (name) {
                safeRun('setFontFamily', function () {
                    window.rendition.themes.font(name);
                    window.rendition.resize(window.innerWidth, window.innerHeight);
                });
            };

            window.setLineSpacing = function (value) {
                safeRun('setLineSpacing', function () {
                    window.rendition.themes.override('line-height', String(value));
                    window.rendition.resize(window.innerWidth, window.innerHeight);
                });
            };

            window.setMargin = function (px) {
                safeRun('setMargin', function () {
                    window.rendition.themes.override('padding', '20px ' + px + 'px');
                    window.rendition.resize(window.innerWidth, window.innerHeight);
                });
            };

            window.setJustify = function (justify) {
                safeRun('setJustify', function () {
                    window.rendition.themes.override('text-align', justify ? 'justify' : 'left');
                    window.rendition.resize(window.innerWidth, window.innerHeight);
                });
            };

            window.setHyphenation = function (on) {
                safeRun('setHyphenation', function () {
                    window.rendition.themes.override('-webkit-hyphens', on ? 'auto' : 'manual');
                    window.rendition.themes.override('hyphens', on ? 'auto' : 'manual');
                    window.rendition.resize(window.innerWidth, window.innerHeight);
                });
            };

            function extractCharacterOffset(cfi) {
                if (!cfi || typeof cfi !== 'string') {
                    return 0;
                }

                var match = cfi.match(/:(\d+)(?:[,\)])?/);
                if (!match || match.length < 2) {
                    return 0;
                }

                var parsed = parseInt(match[1], 10);
                return Number.isFinite(parsed) ? parsed : 0;
            }

            function extractContextSnippet(location) {
                try {
                    var displayed = location && location.start && location.start.displayed;
                    if (displayed && typeof displayed.page === 'string' && displayed.page.trim().length > 0) {
                        return displayed.page.trim().slice(0, 20);
                    }
                } catch (_) {
                    return '';
                }
                return '';
            }

            function countWordsFromText(text) {
                if (typeof text !== 'string') {
                    return 0;
                }
                var trimmed = text.trim();
                if (trimmed.length === 0) {
                    return 0;
                }
                return trimmed.split(/\s+/).length;
            }

            async function loadSectionWordCount(index) {
                if (!window.book || !window.book.spine || typeof index !== 'number' || index < 0) {
                    return 0;
                }

                var section = window.book.spine.get(index);
                if (!section) {
                    return 0;
                }

                try {
                    var loaded = await section.load(window.book.load.bind(window.book));
                    var text = '';
                    if (loaded && loaded.document && loaded.document.body) {
                        text = loaded.document.body.innerText || loaded.document.body.textContent || '';
                    }
                    return countWordsFromText(text);
                } catch (_) {
                    return 0;
                } finally {
                    try {
                        section.unload();
                    } catch (_) {
                    }
                }
            }

            async function sendWordCountSample() {
                var counts = [];
                counts.push(await loadSectionWordCount(0));
                counts.push(await loadSectionWordCount(1));
                window.bridge.send('wordCountSample', { counts: counts });
            }

            window.requestChapterWordCount = function (index) {
                (async function () {
                    var count = await loadSectionWordCount(index);
                    window.bridge.send('chapterWordCount', {
                        index: index,
                        count: count
                    });
                })();
            };

            window.loadBook = function (bookURL, fallbackBase64) {
                (async function () {
                    try {
                        window.currentLoadToken += 1;
                        var loadToken = window.currentLoadToken;
                        teardownCurrentBook();

                        var loadedBook = null;
                        if (typeof bookURL === 'string' && bookURL.length > 0) {
                            loadedBook = ePub(bookURL);
                        } else if (typeof fallbackBase64 === 'string' && fallbackBase64.length > 0) {
                            loadedBook = ePub(fallbackBase64, { encoding: 'base64' });
                        } else {
                            throw new Error('No valid EPUB input provided');
                        }

                        await withTimeout(loadedBook.opened, 15000, 'book.opened');

                        if (loadToken !== window.currentLoadToken) {
                            return;
                        }

                        window.book = loadedBook;
                        window.rendition = window.book.renderTo('viewer', {
                            flow: 'paginated',
                            spread: 'none',
                            minSpreadWidth: 9999,
                            width: window.innerWidth,
                            height: window.innerHeight
                        });

                        Object.keys(themeMap).forEach(function (name) {
                            var t = themeMap[name];
                            window.rendition.themes.register(name, {
                                'body': { 'background': t.bg, 'color': t.fg }
                            });
                        });
                        window.rendition.themes.select('light');
                        window.rendition.on('rendered', function () {
                            applyContentTheme('light');
                        });

                        window.rendition.on('relocated', function (location) {
                            var cfi = (location && location.start && location.start.cfi) ? location.start.cfi : '';
                            var pct = (location && location.start && typeof location.start.percentage === 'number')
                                ? location.start.percentage
                                : 0;
                            var spineHref = (location && location.start && location.start.href) ? location.start.href : '';
                            var characterOffset = extractCharacterOffset(cfi);
                            var contextSnippet = extractContextSnippet(location);

                            window.bridge.send('relocated', {
                                cfi: cfi,
                                percentage: pct,
                                spineHref: spineHref,
                                characterOffset: characterOffset,
                                contextSnippet: contextSnippet,
                                atEnd: location.atEnd === true
                            });
                            if (location.atEnd === true) {
                                window.bridge.send('atChapterEnd', {});
                            }
                        });

                        window.rendition.on('selected', function (cfiRange, contents) {
                            var text = '';
                            try {
                                text = contents.window.getSelection().toString();
                            } catch (_) {
                                text = '';
                            }
                            window.bridge.send('selected', {
                                cfiRange: cfiRange,
                                text: text
                            });
                        });

                        window.rendition.on('markClicked', function (cfiRange, data) {
                            var id = (data && data.id) ? data.id : cfiRange;
                            window.bridge.send('markClicked', { id: id });
                        });

                        window.rendition.hooks.content.register(function (contents) {
                            installFootnoteInterceptors(contents);
                        });

                        await withTimeout(window.rendition.display(), 15000, 'rendition.display');
                        await withTimeout(window.book.ready, 15000, 'book.ready');
                        if (loadToken === window.currentLoadToken) {
                            await sendWordCountSample();
                            window.bridge.send('bookReady', {});
                        }
                    } catch (error) {
                        var message = (error && error.message) ? error.message : String(error);
                        window.bridge.send('bookError', { message: message });
                    }
                })();
            };

            window.nextPage = function () {
                safeRun('nextPage', function () {
                    window.rendition.next();
                });
            };

            window.prevPage = function () {
                safeRun('prevPage', function () {
                    window.rendition.prev();
                });
            };

            window.displayCFI = function (cfi) {
                if (window.rendition && cfi) {
                    window.rendition.display(cfi);
                }
            };

            window.resizeRendition = function (w, h) {
                safeRun('resizeRendition', function () {
                    window.rendition.resize(w, h);
                });
            };


            window.snapshotLocations = function () {
                if (!window.book || !window.book.locations) {
                    window.bridge.send('locationsSnapshot', {
                        totalLocations: 0,
                        serializedLocations: null
                    });
                    return;
                }

                var totalLocations = 0;
                if (Array.isArray(window.book.locations._locations)) {
                    totalLocations = window.book.locations._locations.length;
                } else if (typeof window.book.locations.length === 'number') {
                    totalLocations = window.book.locations.length;
                }

                var serializedLocations = null;
                try {
                    serializedLocations = window.book.locations.save();
                } catch (_) {
                    serializedLocations = null;
                }

                window.bridge.send('locationsSnapshot', {
                    totalLocations: totalLocations,
                    serializedLocations: serializedLocations
                });
            };

        })();
    </script>
</body>
</html>
