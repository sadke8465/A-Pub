<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>EpubReader</title>
    <script src="jszip.min.js"></script>
    <script src="epub.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #FFFFF8;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        #viewer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div id="viewer"></div>
    <script>
        (function () {
            'use strict';

            window.bridge = {
                send: function (type, data) {
                    var payload = Object.assign({ type: type }, data || {});
                    window.webkit.messageHandlers.bridge.postMessage(payload);
                }
            };

            window.book = null;
            window.rendition = null;

            function resizeToViewport() {
                if (!window.rendition) {
                    return;
                }
                window.resizeRendition(window.innerWidth, window.innerHeight);
            }

            window.loadBook = async function (base64) {
                try {
                    window.book = ePub(base64, { encoding: 'base64' });

                    window.rendition = window.book.renderTo('viewer', {
                        flow: 'paginated',
                        spread: 'none',
                        minSpreadWidth: 9999,
                        width: '100%',
                        height: '100%'
                    });

                    window.rendition.themes.register('app-default', {
                        body: {
                            color: '#111111',
                            'background-color': 'transparent'
                        }
                    });
                    window.rendition.themes.register('app-dark', {
                        body: {
                            color: '#E5E7EB',
                            'background-color': '#111827'
                        }
                    });
                    window.rendition.themes.select('app-default');

                    window.rendition.hooks.content.register(function (contents) {
                        return contents.addStylesheet('reader.css');
                    });

                    window.rendition.on('relocated', function (location) {
                        window.bridge.send('relocated', {
                            cfi: location.start.cfi,
                            pct: location.start.percentage,
                            spineHref: location.start.href || '',
                            atEnd: location.atEnd === true
                        });
                    });

                    window.rendition.on('selected', function (cfiRange, contents) {
                        var text = '';
                        try {
                            text = contents.window.getSelection().toString();
                        } catch (_) {
                            text = '';
                        }
                        window.bridge.send('selected', {
                            cfiRange: cfiRange,
                            text: text
                        });
                    });

                    window.rendition.on('markClicked', function (cfiRange, data) {
                        var id = (data && data.id) ? data.id : cfiRange;
                        window.bridge.send('markClicked', { id: id });
                    });

                    await window.rendition.display();
                    await window.book.ready;
                    window.requestAnimationFrame(resizeToViewport);
                    window.bridge.send('bookReady', {});
                } catch (error) {
                    var message = (error && error.message) ? error.message : String(error);
                    window.bridge.send('bookError', { message: message });
                }
            };

            window.nextPage = function () {
                if (window.rendition) {
                    window.rendition.next();
                }
            };

            window.prevPage = function () {
                if (window.rendition) {
                    window.rendition.prev();
                }
            };

            window.displayCFI = function (cfi) {
                if (window.rendition && cfi) {
                    window.rendition.display(cfi);
                }
            };

            window.resizeRendition = function (w, h) {
                if (window.rendition) {
                    window.rendition.resize(w, h);
                }
            };

            window.addEventListener('resize', resizeToViewport);
            window.addEventListener('orientationchange', function () {
                window.setTimeout(resizeToViewport, 50);
            });

            window.setTheme = function (appearance) {
                if (!window.rendition) {
                    return;
                }
                var theme = appearance === 'dark' ? 'app-dark' : 'app-default';
                window.rendition.themes.select(theme);
            };
        })();
    </script>
</body>
</html>
