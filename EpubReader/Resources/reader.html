<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>EpubReader</title>
    <script src="jszip.min.js"></script>
    <script src="epub.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #FFFFF8;
            -webkit-touch-callout: default;
            -webkit-user-select: text;
            user-select: text;
        }
        #viewer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div id="viewer"></div>
    <script>
        (function () {
            'use strict';

            window.bridge = {
                send: function (type, data) {
                    var payload = Object.assign({ type: type }, data || {});
                    window.webkit.messageHandlers.bridge.postMessage(payload);
                }
            };

            function bridgeSendSafe(type, data) {
                try {
                    window.bridge.send(type, data);
                } catch (error) {
                    var message = (error && error.message) ? error.message : String(error);
                    console.error('[bridgeSendSafe] failed for type=' + type + ': ' + message);
                }
            }

            function sendDiagnostic(level, message, details) {
                bridgeSendSafe('jsDiagnostic', {
                    level: level,
                    message: message,
                    details: details || null
                });
            }

            function stringifyDetails(details) {
                if (details == null) { return ''; }
                if (typeof details === 'string') { return details; }
                try {
                    return JSON.stringify(details);
                } catch (_) {
                    return String(details);
                }
            }

            function logInfo(message, details) {
                console.log('[reader] ' + message, details || '');
                sendDiagnostic('info', message, stringifyDetails(details));
            }

            function logWarn(message, details) {
                console.warn('[reader] ' + message, details || '');
                sendDiagnostic('warn', message, stringifyDetails(details));
            }

            function logError(message, details) {
                console.error('[reader] ' + message, details || '');
                sendDiagnostic('error', message, stringifyDetails(details));
            }

            window.addEventListener('error', function (event) {
                logError('window error', {
                    message: event && event.message ? event.message : '',
                    source: event && event.filename ? event.filename : '',
                    line: event && event.lineno ? event.lineno : 0,
                    column: event && event.colno ? event.colno : 0
                });
            });

            window.addEventListener('unhandledrejection', function (event) {
                var reason = event && event.reason ? event.reason : 'unknown';
                logError('unhandled promise rejection', { reason: String(reason) });
            });

            function verifyDependency(name, ref) {
                if (typeof ref === 'undefined' || ref === null) {
                    logError('dependency missing', { dependency: name });
                    return false;
                }
                logInfo('dependency available', { dependency: name });
                return true;
            }

            function registerResourceWatchers() {
                document.querySelectorAll('script[src], link[rel="stylesheet"], img[src]').forEach(function (node) {
                    var source = node.src || node.href || '(inline)';
                    node.addEventListener('load', function () {
                        logInfo('resource loaded', { source: source, tag: node.tagName });
                    });
                    node.addEventListener('error', function () {
                        logError('resource failed to load', { source: source, tag: node.tagName });
                    });
                });
            }

            window.book = null;
            window.rendition = null;
            window.currentLoadToken = 0;

            function withTimeout(promise, timeoutMs, label) {
                return Promise.race([
                    promise,
                    new Promise(function (_, reject) {
                        setTimeout(function () {
                            reject(new Error(label + ' timed out after ' + timeoutMs + 'ms'));
                        }, timeoutMs);
                    })
                ]);
            }

            function teardownCurrentBook() {
                logInfo('teardownCurrentBook start');
                try {
                    if (window.rendition) {
                        logInfo('destroying rendition');
                        window.rendition.destroy();
                    }
                } catch (error) {
                    logWarn('failed to destroy rendition', { message: String(error) });
                }

                try {
                    if (window.book && typeof window.book.destroy === 'function') {
                        logInfo('destroying book');
                        window.book.destroy();
                    }
                } catch (error) {
                    logWarn('failed to destroy book', { message: String(error) });
                }

                window.rendition = null;
                window.book = null;

                var viewer = document.getElementById('viewer');
                if (viewer) {
                    viewer.innerHTML = '';
                } else {
                    logError('viewer element missing during teardown');
                }
            }

            var themeMap = {
                light:  { bg: '#FFFFF8', fg: '#1C1C1E' },
                dark:   { bg: '#1C1C1E', fg: '#E5E5EA' },
                sepia:  { bg: '#F4ECD8', fg: '#3B2F2F' },
                custom: { bg: '#FFFFF8', fg: '#1C1C1E' }
            };

            function canUseRendition(commandName) {
                if (!window.rendition) {
                    window.bridge.send('jsGuardBlocked', { command: commandName, reason: 'missingRendition' });
                    return false;
                }
                if (!window.rendition.manager) {
                    window.bridge.send('jsGuardBlocked', { command: commandName, reason: 'missingManager' });
                    return false;
                }
                return true;
            }

            function safeRun(commandName, fn) {
                if (!canUseRendition(commandName)) {
                    logWarn('safeRun blocked by guard', { command: commandName });
                    return;
                }
                try {
                    logInfo('safeRun executing', { command: commandName });
                    fn();
                } catch (error) {
                    var message = (error && error.message) ? error.message : String(error);
                    logError('safeRun execution error', { command: commandName, error: message });
                    window.bridge.send('bookError', { message: commandName + ': ' + message });
                }
            }

            function applyContentTheme(name) {
                if (!window.rendition) { return; }

                var selectedTheme = normalizedThemeName(name);
                var t = themeMap[selectedTheme];

                window.rendition.getContents().forEach(function (content) {
                    try {
                        var doc = content && content.document;
                        if (!doc) { return; }

                        var styleId = 'apub-theme-override';
                        var style = doc.getElementById(styleId);
                        if (!style) {
                            style = doc.createElement('style');
                            style.id = styleId;
                            doc.head.appendChild(style);
                        }

                        style.textContent = [
                            'html, body {',
                            '  background: ' + t.bg + ' !important;',
                            '  color: ' + t.fg + ' !important;',
                            '  -webkit-text-fill-color: ' + t.fg + ' !important;',
                            '  -webkit-touch-callout: default !important;',
                            '  -webkit-user-select: text !important;',
                            '  user-select: text !important;',
                            '}',
                            'p, div, span, li, blockquote, dd, dt {',
                            '  color: ' + t.fg + ' !important;',
                            '  -webkit-text-fill-color: ' + t.fg + ' !important;',
                            '}'
                        ].join('\n');
                    } catch (error) {
                        logWarn('theme injection failed for one spine', { message: String(error) });
                    }
                });
            }

            function normalizedThemeName(name) {
                if (typeof name !== 'string' || !themeMap[name]) {
                    return 'light';
                }
                return name;
            }

            function installFootnoteInterceptors(contents) {
                try {
                    var doc = contents && contents.document;
                    if (!doc) { return; }
                    var links = doc.querySelectorAll('a[epub\\:type~="noteref"], a[role~="doc-noteref"]');
                    links.forEach(function (link) {
                        if (link.dataset && link.dataset.apubFootnoteBound === '1') {
                            return;
                        }

                        var handler = function (event) {
                            event.preventDefault();
                            event.stopPropagation();

                            var href = link.getAttribute('href') || '';
                            var text = '';

                            if (href.indexOf('#') >= 0) {
                                var fragment = href.split('#').pop();
                                if (fragment) {
                                    var decoded = decodeURIComponent(fragment);
                                    var byId = doc.getElementById(decoded);
                                    if (byId && byId.textContent) {
                                        text = byId.textContent.trim();
                                    }
                                }
                            }

                            if (!text && link.title) {
                                text = link.title.trim();
                            }
                            if (!text && link.textContent) {
                                text = link.textContent.trim();
                            }

                            window.bridge.send('footnoteRequest', { href: href, text: text });
                        };

                        link.addEventListener('click', handler, true);
                        if (link.dataset) {
                            link.dataset.apubFootnoteBound = '1';
                        }
                    });
                } catch (_) {
                    // Non-fatal: footnote interception should never break reading.
                }
            }

            window.setTheme = function (name) {
                if (!window.rendition) { return; }
                var selectedTheme = normalizedThemeName(name);
                var t = themeMap[selectedTheme];
                logInfo('setTheme', { requested: name, applied: selectedTheme, colors: t });
                window.rendition.themes.select(selectedTheme);
                document.documentElement.style.background = t.bg;
                document.body.style.background = t.bg;
                applyContentTheme(selectedTheme);
            };

            window.setFontSize = function (px) {
                safeRun('setFontSize', function () {
                    window.rendition.themes.fontSize(px + 'px');
                    window.rendition.resize(window.innerWidth, window.innerHeight);
                });
            };

            window.setFontFamily = function (name) {
                safeRun('setFontFamily', function () {
                    window.rendition.themes.font(name);
                    window.rendition.resize(window.innerWidth, window.innerHeight);
                });
            };

            window.setLineSpacing = function (value) {
                safeRun('setLineSpacing', function () {
                    window.rendition.themes.override('line-height', String(value));
                    window.rendition.resize(window.innerWidth, window.innerHeight);
                });
            };

            window.setMargin = function (px) {
                safeRun('setMargin', function () {
                    window.rendition.themes.override('padding', '20px ' + px + 'px');
                    window.rendition.resize(window.innerWidth, window.innerHeight);
                });
            };

            window.setJustify = function (justify) {
                safeRun('setJustify', function () {
                    window.rendition.themes.override('text-align', justify ? 'justify' : 'left');
                    window.rendition.resize(window.innerWidth, window.innerHeight);
                });
            };

            window.setHyphenation = function (on) {
                safeRun('setHyphenation', function () {
                    window.rendition.themes.override('-webkit-hyphens', on ? 'auto' : 'manual');
                    window.rendition.themes.override('hyphens', on ? 'auto' : 'manual');
                    window.rendition.resize(window.innerWidth, window.innerHeight);
                });
            };

            function extractCharacterOffset(cfi) {
                if (!cfi || typeof cfi !== 'string') {
                    return 0;
                }

                var match = cfi.match(/:(\d+)(?:[,\)])?/);
                if (!match || match.length < 2) {
                    return 0;
                }

                var parsed = parseInt(match[1], 10);
                return Number.isFinite(parsed) ? parsed : 0;
            }

            function extractContextSnippet(location) {
                try {
                    var displayed = location && location.start && location.start.displayed;
                    if (displayed && typeof displayed.page === 'string' && displayed.page.trim().length > 0) {
                        return displayed.page.trim().slice(0, 20);
                    }
                } catch (_) {
                    return '';
                }
                return '';
            }

            function countWordsFromText(text) {
                if (typeof text !== 'string') {
                    return 0;
                }
                var trimmed = text.trim();
                if (trimmed.length === 0) {
                    return 0;
                }
                return trimmed.split(/\s+/).length;
            }

            async function loadSectionWordCount(index) {
                if (!window.book || !window.book.spine || typeof index !== 'number' || index < 0) {
                    return 0;
                }

                var section = window.book.spine.get(index);
                if (!section) {
                    return 0;
                }

                try {
                    var loaded = await section.load(window.book.load.bind(window.book));
                    var text = '';
                    if (loaded && loaded.document && loaded.document.body) {
                        text = loaded.document.body.innerText || loaded.document.body.textContent || '';
                    }
                    return countWordsFromText(text);
                } catch (_) {
                    return 0;
                } finally {
                    try {
                        section.unload();
                    } catch (_) {
                    }
                }
            }

            async function sendWordCountSample() {
                var counts = [];
                counts.push(await loadSectionWordCount(0));
                counts.push(await loadSectionWordCount(1));
                window.bridge.send('wordCountSample', { counts: counts });
            }

            function spineHrefForContents(contents) {
                if (contents && contents.section && contents.section.href) {
                    return contents.section.href;
                }
                if (contents && contents.cfiBase) {
                    return contents.cfiBase;
                }
                return '';
            }

            function requestHighlightsForContents(contents) {
                var spineHref = spineHrefForContents(contents);
                if (!spineHref) {
                    return;
                }
                window.bridge.send('requestHighlights', { spineHref: spineHref });
            }

            window.requestChapterWordCount = function (index) {
                (async function () {
                    var count = await loadSectionWordCount(index);
                    window.bridge.send('chapterWordCount', {
                        index: index,
                        count: count
                    });
                })();
            };

            window.addHighlight = function (cfiRange, colorClass, id) {
                safeRun('addHighlight', function () {
                    if (typeof cfiRange !== 'string' || cfiRange.length === 0) {
                        return;
                    }
                    var appliedColorClass = (typeof colorClass === 'string' && colorClass.length > 0)
                        ? colorClass
                        : 'hl-yellow';
                    var highlightID = (typeof id === 'string' && id.length > 0) ? id : cfiRange;
                    try {
                        window.rendition.annotations.remove(cfiRange, 'highlight');
                    } catch (_) {
                    }
                    window.rendition.annotations.highlight(
                        cfiRange,
                        { id: highlightID, cfiRange: cfiRange },
                        function (event) {
                            var target = event && event.target ? event.target : null;
                            var id = target && target.dataset && target.dataset.id
                                ? target.dataset.id
                                : highlightID;
                            window.bridge.send('markClicked', { id: id, cfiRange: cfiRange });
                        },
                        appliedColorClass,
                        {}
                    );
                });
            };

            window.removeHighlight = function (cfiRange) {
                safeRun('removeHighlight', function () {
                    if (typeof cfiRange !== 'string' || cfiRange.length === 0) {
                        return;
                    }
                    window.rendition.annotations.remove(cfiRange, 'highlight');
                });
            };

            window.applyHighlights = function (json) {
                safeRun('applyHighlights', function () {
                    var highlights = [];
                    try {
                        highlights = (typeof json === 'string') ? JSON.parse(json) : json;
                    } catch (error) {
                        logWarn('applyHighlights JSON parse failed', { message: String(error) });
                        return;
                    }

                    if (!Array.isArray(highlights)) {
                        return;
                    }

                    highlights.forEach(function (highlight) {
                        if (!highlight || !highlight.cfiRange) {
                            return;
                        }
                        window.addHighlight(highlight.cfiRange, highlight.colorClass, highlight.id);
                    });
                });
            };

            window.loadBook = function (bookURL, fallbackBase64) {
                (async function () {
                    try {
                        window.currentLoadToken += 1;
                        var loadToken = window.currentLoadToken;
                        logInfo('loadBook start', {
                            loadToken: loadToken,
                            hasBookURL: typeof bookURL === 'string' && bookURL.length > 0,
                            hasFallbackBase64: typeof fallbackBase64 === 'string' && fallbackBase64.length > 0
                        });
                        teardownCurrentBook();

                        var loadedBook = null;
                        if (typeof fallbackBase64 === 'string' && fallbackBase64.length > 0) {
                            logInfo('loading book via base64 fallback');
                            loadedBook = ePub(fallbackBase64, { encoding: 'base64', replacements: 'base64' });
                        } else if (typeof bookURL === 'string' && bookURL.length > 0) {
                            logInfo('loading book via URL', { bookURL: bookURL });
                            loadedBook = ePub(bookURL, { replacements: 'base64' });
                        } else {
                            throw new Error('No valid EPUB input provided');
                        }

                        await withTimeout(loadedBook.opened, 15000, 'book.opened');
                        logInfo('book.opened resolved', { loadToken: loadToken });

                        if (loadToken !== window.currentLoadToken) {
                            logWarn('loadBook abandoned due to stale token', { loadToken: loadToken, currentLoadToken: window.currentLoadToken });
                            return;
                        }

                        window.book = loadedBook;
                        window.rendition = window.book.renderTo('viewer', {
                            flow: 'paginated',
                            spread: 'none',
                            minSpreadWidth: 9999,
                            width: window.innerWidth,
                            height: window.innerHeight
                        });
                        logInfo('rendition created', { width: window.innerWidth, height: window.innerHeight });

                        Object.keys(themeMap).forEach(function (name) {
                            var t = themeMap[name];
                            window.rendition.themes.register(name, {
                                'body': { 'background': t.bg, 'color': t.fg }
                            });
                        });
                        window.rendition.themes.select('light');
                        window.rendition.on('rendered', function () {
                            applyContentTheme('light');
                        });

                        window.rendition.on('relocated', function (location) {
                            var cfi = (location && location.start && location.start.cfi) ? location.start.cfi : '';
                            var pct = (location && location.start && typeof location.start.percentage === 'number')
                                ? location.start.percentage
                                : 0;
                            var spineHref = (location && location.start && location.start.href) ? location.start.href : '';
                            var characterOffset = extractCharacterOffset(cfi);
                            var contextSnippet = extractContextSnippet(location);

                            window.bridge.send('relocated', {
                                cfi: cfi,
                                percentage: pct,
                                spineHref: spineHref,
                                characterOffset: characterOffset,
                                contextSnippet: contextSnippet,
                                atEnd: location.atEnd === true
                            });
                            if (location.atEnd === true) {
                                window.bridge.send('atChapterEnd', {});
                            }
                        });

                        window.rendition.on('selected', function (cfiRange, contents) {
                            var text = '';
                            var rect = { x: 0, y: 0, width: 0, height: 0 };
                            try {
                                var selection = contents.window.getSelection();
                                text = selection.toString().trim();
                                if (text.length < 2 || selection.rangeCount === 0) {
                                    return;
                                }

                                var rangeRect = selection.getRangeAt(0).getBoundingClientRect();
                                var frameRect = { x: 0, y: 0 };
                                if (contents.document && contents.document.defaultView && contents.document.defaultView.frameElement) {
                                    frameRect = contents.document.defaultView.frameElement.getBoundingClientRect();
                                }

                                rect = {
                                    x: frameRect.x + rangeRect.x,
                                    y: frameRect.y + rangeRect.y,
                                    width: rangeRect.width,
                                    height: rangeRect.height
                                };
                            } catch (_) {
                                return;
                            }

                            window.bridge.send('textSelected', {
                                cfiRange: cfiRange,
                                text: text,
                                x: rect.x,
                                y: rect.y,
                                width: rect.width,
                                height: rect.height
                            });
                        });

                        window.rendition.on('markClicked', function (cfiRange, data) {
                            var id = (data && data.id) ? data.id : cfiRange;
                            window.bridge.send('markClicked', { id: id, cfiRange: cfiRange });
                        });

                        window.rendition.hooks.content.register(function (contents) {
                            installFootnoteInterceptors(contents);
                            requestHighlightsForContents(contents);
                        });

                        await withTimeout(window.rendition.display(), 15000, 'rendition.display');
                        logInfo('rendition.display resolved', { loadToken: loadToken });
                        await withTimeout(window.book.ready, 15000, 'book.ready');
                        logInfo('book.ready resolved', { loadToken: loadToken });
                        if (loadToken === window.currentLoadToken) {
                            await sendWordCountSample();
                            logInfo('wordCountSample sent', { loadToken: loadToken });
                            window.bridge.send('bookReady', {});
                            logInfo('bookReady sent', { loadToken: loadToken });
                        }
                    } catch (error) {
                        var message = (error && error.message) ? error.message : String(error);
                        logError('loadBook failed', { message: message });
                        window.bridge.send('bookError', { message: message });
                    }
                })();
            };

            window.nextPage = function () {
                safeRun('nextPage', function () {
                    window.rendition.next();
                });
            };

            window.prevPage = function () {
                safeRun('prevPage', function () {
                    window.rendition.prev();
                });
            };

            window.displayCFI = function (cfi) {
                if (window.rendition && cfi) {
                    window.rendition.display(cfi);
                }
            };

            window.displayAdjacent = function (cfi, delta) {
                safeRun('displayAdjacent', function () {
                    var displayPromise = (typeof cfi === 'string' && cfi.length > 0)
                        ? window.rendition.display(cfi)
                        : Promise.resolve();

                    Promise.resolve(displayPromise).then(function () {
                        if (delta > 0) {
                            return window.rendition.next();
                        }
                        if (delta < 0) {
                            return window.rendition.prev();
                        }
                        return null;
                    }).catch(function (error) {
                        var message = (error && error.message) ? error.message : String(error);
                        logWarn('displayAdjacent failed', { message: message, delta: delta });
                    });
                });
            };

            window.resizeRendition = function (w, h) {
                safeRun('resizeRendition', function () {
                    window.rendition.resize(w, h);
                });
            };


            window.snapshotLocations = function () {
                if (!window.book || !window.book.locations) {
                    logWarn('snapshotLocations called without locations');
                    window.bridge.send('locationsSnapshot', {
                        totalLocations: 0,
                        serializedLocations: null
                    });
                    return;
                }

                var totalLocations = 0;
                if (Array.isArray(window.book.locations._locations)) {
                    totalLocations = window.book.locations._locations.length;
                } else if (typeof window.book.locations.length === 'number') {
                    totalLocations = window.book.locations.length;
                }

                var serializedLocations = null;
                try {
                    serializedLocations = window.book.locations.save();
                } catch (error) {
                    logWarn('locations.save failed', { message: String(error) });
                    serializedLocations = null;
                }

                window.bridge.send('locationsSnapshot', {
                    totalLocations: totalLocations,
                    serializedLocations: serializedLocations
                });
            };

            registerResourceWatchers();
            verifyDependency('JSZip', window.JSZip);
            verifyDependency('ePub', window.ePub);
            var viewerOnBoot = document.getElementById('viewer');
            if (!viewerOnBoot) {
                logError('viewer element missing at boot');
            } else {
                logInfo('viewer element located', { clientWidth: viewerOnBoot.clientWidth, clientHeight: viewerOnBoot.clientHeight });
            }
            logInfo('reader bootstrap complete', { userAgent: navigator.userAgent });

        })();
    </script>
</body>
</html>
